services:
  bot:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bot_user:bot_pass@postgres:5432/tarot_bot
      REDIS_URL: redis://redis:6379/0
      TZ: Europe/Moscow
    env_file:
      - .env
    command: sh -c "alembic upgrade head && python -m src.main"
    restart: unless-stopped
    volumes:
      - ./src:/app/src
      - ./logs:/app/logs
      - ./alembic.ini:/app/alembic.ini
      - /etc/localtime:/etc/localtime:ro
      - ./scripts/tarot-images.json:/app/scripts/tarot-images.json
      - ./scripts/tarot_images:/app/scripts/tarot_images

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: tarot_bot
      POSTGRES_USER: bot_user
      POSTGRES_PASSWORD: bot_pass
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "bot_user", "-d", "tarot_bot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: