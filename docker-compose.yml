services:
  bot:
    image: ghcr.io/mageri9/tarot_magerie_bot:latest
    container_name: tarot_bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://bot_user:bot_pass@tarot_bot_postgres:5432/tarot_bot
      REDIS_URL: redis://tarot_bot_redis:6379/0
      TZ: Europe/Moscow
    env_file:
      - .env
    command: sh -c "alembic upgrade head && python -m src.main"
    volumes:
      - ./logs:/app/logs
    networks:
      - tarot_bot_net

  postgres:
    image: postgres:15
    container_name: tarot_bot_postgres
    environment:
      POSTGRES_DB: tarot_bot
      POSTGRES_USER: bot_user
      POSTGRES_PASSWORD: bot_pass
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "bot_user", "-d", "tarot_bot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - tarot_bot_postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - tarot_bot_net

  redis:
    image: redis:7-alpine
    container_name: tarot_bot_redis
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - tarot_bot_redis_data:/data
    restart: unless-stopped
    networks:
      - tarot_bot_net

volumes:
  tarot_bot_postgres_data:
  tarot_bot_redis_data:

networks:
  tarot_bot_net:
    driver: bridge