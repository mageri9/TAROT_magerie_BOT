line-length = 100
target-version = "py311"

[lint]
select = ["E", "F", "I", "N", "W"]
ignore = [
    "E402",  # Module level import not at top of file (conftest.py sys.path)
    "E501",  # Line too long
    "E712",  # Boolean comparison (== True)
    "E722",  # Bare except
]

[lint.isort]
known-first-party = ["src"]